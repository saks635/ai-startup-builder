<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signup | AI Startup Builder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/app.css" rel="stylesheet">
</head>

<body class="auth-bg">
  <!-- Floating dots -->
  <div class="float-dot"></div>
  <div class="float-dot"></div>
  <div class="float-dot"></div>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="card shadow-sm border-0 auth-card">
          <div class="card-body p-4 p-md-5">
            <h1 class="h3 mb-1"
              style="background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
              <i class="bi bi-rocket-takeoff"></i> Create Account
            </h1>
            <p class="text-secondary mb-4">Sign up to run startup workflows and track results.</p>

            <form id="signupForm" class="vstack gap-3">
              <div>
                <label for="name" class="form-label">Full Name</label>
                <input id="name" type="text" class="form-control" placeholder="John Doe" required>
              </div>
              <div>
                <label for="email" class="form-label">Email</label>
                <input id="email" type="email" class="form-control" placeholder="you@example.com" required>
              </div>
              <div>
                <label for="password" class="form-label">Password</label>
                <input id="password" type="password" class="form-control" placeholder="••••••••" minlength="6" required>
              </div>

              <!-- Integrations Section -->
              <div class="integrations-box mt-1">
                <p class="fw-semibold mb-2 text-primary" style="color: var(--accent-hover) !important;">
                  <i class="bi bi-plug"></i> Connect Integrations
                  <span class="text-secondary fw-normal small">(optional)</span>
                </p>
                <p class="text-secondary small mb-3">
                  Provide tokens so your generated websites deploy to <strong style="color:var(--text-primary)">your
                    own</strong> GitHub &amp; Vercel accounts.
                </p>

                <!-- GitHub Token -->
                <div class="mb-3">
                  <label for="githubToken" class="form-label small">
                    <i class="bi bi-github"></i> GitHub Personal Access Token
                  </label>
                  <input id="githubToken" type="password" class="form-control form-control-sm"
                    placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
                  <div class="form-text">
                    <a href="https://github.com/settings/tokens/new?scopes=repo&description=AI-Startup-Builder"
                      target="_blank" rel="noopener">Generate a token</a> with <code>repo</code> scope.
                  </div>
                </div>

                <!-- Vercel Token -->
                <div>
                  <label for="vercelToken" class="form-label small">
                    <i class="bi bi-cloud-arrow-up"></i> Vercel API Token
                  </label>
                  <input id="vercelToken" type="password" class="form-control form-control-sm"
                    placeholder="vcp_xxxxxxxxxxxxxxxxxxxx">
                  <div class="form-text">
                    <a href="https://vercel.com/account/tokens" target="_blank" rel="noopener">Create a token</a> in
                    your Vercel settings.
                  </div>
                </div>
              </div>

              <div id="errorBox" class="alert alert-danger d-none mb-0" role="alert"></div>
              <div id="successBox" class="alert alert-success d-none mb-0" role="alert"></div>
              <button id="submitBtn" class="btn btn-primary w-100" type="submit">
                <i class="bi bi-person-plus"></i> Create Account
              </button>
            </form>

            <p class="mt-4 mb-0 text-center text-secondary">
              Already have an account? <a href="login.html">Login</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/signup.js"></script>
</body>

</html>
