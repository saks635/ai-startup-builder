<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | AI Startup Builder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/app.css" rel="stylesheet">
</head>

<body class="auth-bg">
  <!-- Floating dots -->
  <div class="float-dot"></div>
  <div class="float-dot"></div>
  <div class="float-dot"></div>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="card shadow-sm border-0 auth-card">
          <div class="card-body p-4 p-md-5">
            <h1 class="h3 mb-1"
              style="background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
              <i class="bi bi-rocket-takeoff"></i> AI Startup Builder
            </h1>
            <p class="text-secondary mb-4">Login to generate startup analysis and deployed website links.</p>

            <form id="loginForm" class="vstack gap-3">
              <div>
                <label for="email" class="form-label">Email</label>
                <input id="email" type="email" class="form-control" placeholder="you@example.com" required>
              </div>
              <div>
                <label for="password" class="form-label">Password</label>
                <input id="password" type="password" class="form-control" placeholder="••••••••" required>
              </div>
              <div id="errorBox" class="alert alert-danger d-none mb-0" role="alert"></div>
              <button id="submitBtn" class="btn btn-primary w-100" type="submit">
                <i class="bi bi-box-arrow-in-right"></i> Login
              </button>
            </form>

            <p class="mt-4 mb-0 text-center text-secondary">
              New here? <a href="signup.html">Create an account</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/login.js"></script>
</body>

</html>
